<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Повідомити про стан</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body class="bg-light">
    <div id="app" class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-warning py-3">
                        <h4 class="mb-0 text-dark text-center">📋 Повідомити тренера</h4>
                    </div>
                    <div class="card-body p-4">
                        <p class="text-muted small mb-4">Опишіть вашу проблему (хвороба, травма, самопочуття). Тренер отримає це повідомлення негайно.</p>
                        
                        <form @submit.prevent="submitReport">
                            <div class="mb-4">
                                <label class="form-label fw-bold">Опис стану</label>
                                <textarea v-model="note" class="form-control" rows="6" 
                                    placeholder="Наприклад: Захворів, температура 38. Сьогодні на тренуванні не буду." required></textarea>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" :disabled="submitting || !note" class="btn btn-primary btn-lg">
                                    <span v-if="submitting" class="spinner-border spinner-border-sm"></span>
                                    Відправити повідомлення
                                </button>
                                <a href="/web/athlete/dashboard" class="btn btn-outline-secondary">Повернутися</a>
                            </div>
                        </form>

                        <div v-if="message" :class="['alert', isError ? 'alert-danger' : 'alert-success', 'mt-4']">
                            [[ message ]]
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        createApp({
            delimiters: ['[[', ']]'],
            data() {
                return {
                    note: '',
                    submitting: false,
                    message: '',
                    isError: false
                }
            },
            methods: {
                async submitReport() {
                    this.submitting = true;
                    this.message = '';
                    try {
                        // КРИТИЧНО: Перевір цей шлях! Він має збігатися з маршрутом у Gin
                        // Якщо в Gin: r.POST("/api/v1/athelete/health-report", ...)
                        await axios.post('/api/v1/athelete/health-report', {
                            note: this.note
                        });
                        
                        this.message = 'Повідомлення успішно надіслано!';
                        this.isError = false;
                        setTimeout(() => window.location.href = '/web/athlete/dashboard', 1500);
                    } catch (err) {
                        this.isError = true;
                        // Виводимо конкретну помилку від сервера, якщо вона є
                        this.message = 'Помилка: ' + (err.response?.data?.error || 'Сервер не відповідає');
                    } finally {
                        this.submitting = false;
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
